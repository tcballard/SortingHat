name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Build app
        run: BUILD_CONFIGURATION=release ./script/build_and_run.sh package
      - name: Sign app locally
        run: codesign --force --deep --sign - "dist/Sorting Hat.app"
      - name: Archive app
        run: ditto -c -k --sequesterRsrc --keepParent "dist/Sorting Hat.app" "Sorting-Hat-${GITHUB_REF_NAME}.zip"
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" "Sorting-Hat-${GITHUB_REF_NAME}.zip" --generate-notes --title "Sorting Hat $GITHUB_REF_NAME"
      - name: Calculate release checksum
        id: release
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "sha256=$(shasum -a 256 "Sorting-Hat-${GITHUB_REF_NAME}.zip" | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"
      - name: Check out Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: tcballard/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Update Homebrew cask
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.release.outputs.version }}
          SHA256: ${{ steps.release.outputs.sha256 }}
        run: |
          sed -i '' -E "s/version \"[^\"]+\"/version \"$VERSION\"/" Casks/sorting-hat.rb
          sed -i '' -E "s/sha256 \"[^\"]+\"/sha256 \"$SHA256\"/" Casks/sorting-hat.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/sorting-hat.rb
          if ! git diff --cached --quiet; then
            git commit -m "Update Sorting Hat to $VERSION"
            git push origin main
          fi
